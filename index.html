<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,user-scalable=no">
<title>AR PhotoFrame Stable</title>

<script src="https://unpkg.com/three@0.150.1/build/three.min.js"></script>
<script src="https://unpkg.com/mind-ar@1.1.4/dist/mindar-image-three.prod.js"></script>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

#app{position:fixed;inset:0;overflow:hidden;background:#000;}
video,canvas{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;}

#loading{
position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
background:#000;color:#fff;font-size:18px;z-index:100;
}

#guide{
position:fixed;top:18px;left:15px;right:15px;
z-index:30;text-align:center;color:#fff;font-size:17px;
font-weight:700;text-shadow:0 2px 8px rgba(0,0,0,.75);
}

#captureBtn{
position:fixed;bottom:26px;left:50%;
transform:translateX(-50%);
width:88px;height:88px;border:none;background:transparent;
padding:0;z-index:40;display:none;cursor:pointer;
}

#captureBtn:active{transform:translateX(-50%) scale(.92);}

#captureBtn .outer{
position:absolute;inset:0;border-radius:50%;background:#ff0000;
}
#captureBtn .outer::after{
content:"";position:absolute;inset:7px;border-radius:50%;background:#fff;
}
#captureBtn .inner{
position:absolute;inset:12px;border-radius:50%;background:#ff0000;
}

#resetBtn{
position:fixed;bottom:36px;left:22px;width:58px;height:58px;
border:none;border-radius:50%;font-size:26px;color:#fff;
background:rgba(255,255,255,.18);z-index:40;display:none;
}

#flash{
position:fixed;inset:0;background:#fff;opacity:0;
pointer-events:none;z-index:90;
}
</style>
</head>
<body>

<div id="app"></div>
<div id="loading">カメラ起動中...</div>
<div id="guide">① マーカーをスキャンしてください</div>

<button id="captureBtn">
<span class="outer"></span>
<span class="inner"></span>
</button>

<button id="resetBtn">↺</button>

<div id="flash"></div>

<script>
const app=document.getElementById("app");
const loading=document.getElementById("loading");
const guide=document.getElementById("guide");
const captureBtn=document.getElementById("captureBtn");
const resetBtn=document.getElementById("resetBtn");

let scanAR,renderer,scene,camera;
let mascot,selfieVideo;
let selfieMode=false;

const characterFiles=[
"./HayamiHiro.png",
"./KamihamaKoji.png",
"./NishinaKazuki.png"
];

window.addEventListener("load",startAR);

async function startAR(){

scanAR=new window.MINDAR.IMAGE.MindARThree({
container:app,
imageTargetSrc:"./targets.mind",
uiScanning:false,
uiLoading:false,
uiError:false,
videoSettings:{facingMode:{ideal:"environment"}}
});

renderer=scanAR.renderer;
scene=scanAR.scene;
camera=scanAR.camera;

renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);

for(let i=0;i<3;i++){

const texture=await new THREE.TextureLoader().loadAsync(characterFiles[i]);
texture.encoding=THREE.sRGBEncoding;

const mesh=new THREE.Mesh(
new THREE.PlaneGeometry(2.8,4.2),
new THREE.MeshBasicMaterial({
map:texture,
transparent:true,
alphaTest: 0.2
})
);

const anchor=scanAR.addAnchor(i);
anchor.group.add(mesh);

anchor.onTargetFound=async()=>{
mascot=mesh;
await startSelfie();
};

}

await scanAR.start();

loading.style.display="none";

renderer.setAnimationLoop(()=>{
renderer.render(scene,camera);
});
}

async function startSelfie(){

if(selfieMode)return;
selfieMode=true;

guide.innerHTML="② 写真を撮ってください";

await scanAR.stop();
app.innerHTML="";

selfieVideo=document.createElement("video");
selfieVideo.autoplay=true;
selfieVideo.playsInline=true;
selfieVideo.muted=true;
selfieVideo.style.transform="scaleX(-1)";
app.appendChild(selfieVideo);

const stream=await navigator.mediaDevices.getUserMedia({
video:{
facingMode:"user",
width:{ideal:2560},
height:{ideal:1440}
},
audio:false
});

selfieVideo.srcObject=stream;
await selfieVideo.play();

renderer=new THREE.WebGLRenderer({
alpha:true,
antialias:true,
preserveDrawingBuffer:true
});

renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
app.appendChild(renderer.domElement);

scene=new THREE.Scene();

/* CAMERA ANTIGA QUE FUNCIONA */
camera=new THREE.PerspectiveCamera(
28,
innerWidth/innerHeight,
0.1,
100
);

camera.position.z=9;

/* DUPLICA PERSONAGEM */
const texture=mascot.material.map;

mascot=new THREE.Mesh(
new THREE.PlaneGeometry(2.8,4.2),
new THREE.MeshBasicMaterial({
map:texture,
transparent:true,
alphaTest: 0.2
})
);

scene.add(mascot);

/* FIXO DIREITA */
mascot.scale.set(1.65,1.5,1.5);
mascot.position.set(0.95,-1.85,0);

captureBtn.style.display="block";
resetBtn.style.display="block";

animate();
}

function animate(){

requestAnimationFrame(animate);

if(!selfieMode || !mascot) return;

/* personagem totalmente fixo */
mascot.scale.set(1.65,1.5,1.5);
mascot.position.set(0.95,-1.85,0);
mascot.rotation.set(0,0,0);

renderer.render(scene,camera);
}

function flash(){

const el=document.getElementById("flash");
el.style.transition="none";
el.style.opacity="0.95";

setTimeout(()=>{
el.style.transition="opacity .35s ease";
el.style.opacity="0";
},40);
}

out.toBlob(async(blob)=>{

const file = new File(
  [blob],
  "ar-selfie.jpg",
  {type:"image/jpeg"}
);

/* menu nativo salvar/compartilhar */
if(navigator.canShare && navigator.canShare({files:[file]})){
  try{
    await navigator.share({
      files:[file],
      title:"AR Photo"
    });
    return;
  }catch(e){}
}

/* fallback download */
const url = URL.createObjectURL(blob);

const a = document.createElement("a");
a.href = url;
a.download = "ar-selfie.jpg";
a.click();

setTimeout(()=>{
URL.revokeObjectURL(url);
},1000);

},"image/jpeg",1.0);

function resetApp(){location.reload();}

captureBtn.addEventListener("click",takePhoto);
resetBtn.addEventListener("click",resetApp);

window.addEventListener("resize",()=>{

if(renderer)renderer.setSize(innerWidth,innerHeight);

if(camera){
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
}

});
</script>

</body>
</html>
